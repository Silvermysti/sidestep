<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="380" viewBox="0 0 1280 380" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFDFA"/>
      <stop offset="1" stop-color="#FBF3E4"/>
    </linearGradient>
    <linearGradient id="path" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E7C089"/>
      <stop offset="1" stop-color="#cf6b5e"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="380" fill="url(#bg)"/>

  <!-- one clean idea: a route that steps around the block and keeps going -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- the obstacle -->
    <rect x="632" y="232" width="16" height="86" rx="8" fill="#E4D5BC" stroke="none"/>
    <!-- the sidestepping route -->
    <path d="M470 300 H600 Q640 300 640 256 Q640 212 680 212 H812"
          stroke="url(#path)" stroke-width="12"/>
    <!-- arrowhead -->
    <path d="M804 196 l26 16 -26 16" stroke="#cf6b5e" stroke-width="12"/>
    <!-- start dot -->
    <circle cx="470" cy="300" r="9" fill="#E7C089" stroke="none"/>
  </g>

  <!-- wordmark -->
  <text x="640" y="170" text-anchor="middle" font-size="112" font-weight="800" letter-spacing="-3" fill="#4A3728">Side<tspan fill="#cf6b5e">step</tspan></text>

  <!-- tagline -->
  <text x="640" y="352" text-anchor="middle" font-size="30" font-weight="600" fill="#9C6A2A" letter-spacing="0.3">Don’t block the distraction — sidestep it.</text>
</svg>
